const deliveryData = rawData.trim().split('\n').map(line => {
    const parts = line.split(',');
    return {
        rowNumber: parts[0] ? parts[0].trim() : "",
        ar: parts[1] ? parts[1].trim() : "",
        en: parts[2] ? parts[2].trim() : "",
        price: parts[3] ? parts[3].trim() : "",
        searchKey: normalizeArabic((parts[1] || "") + (parts[2] || "") + (parts[3] || ""))
    };
});

function runSearch() {
    const query = normalizeArabic(document.getElementById('searchInput').value);
    const resultsBox = document.getElementById('resultsBox');

    if (query === "") {
        resultsBox.innerHTML = '<div class="no-data">اكتب اسم المكان أو استخدم المايك 🎤..</div>';
        return;
    }

    const filtered = deliveryData.filter(item => item.searchKey.includes(query));

    if (filtered.length > 0) {
        resultsBox.innerHTML = filtered.map(item => `
            <div class="result-item">
                <div class="area-info">
                    <span class="area-name">${item.ar}</span>
                    <span class="area-en">${item.en}</span>
                    <span class="row-number">📋 صف رقم: ${item.rowNumber}</span>
                </div>
                <div class="price-tag">
                    <span class="price-label">خدمة الطيار</span>
                    ${item.price} ج.م
                </div>
            </div>
        `).join('');
    } else {
        resultsBox.innerHTML = '<div class="no-data">لم نجد هذا المكان.. جرب كتابته بشكل مختلف 🔍</div>';
    }
}

let recognizer = null;
function startVoiceSearch() {
    // التأكد من دعم المتصفح
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert('عفواً، متصفحك لا يدعم البحث الصوتي.');
        return;
    }

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const micBtn = document.getElementById('micBtn');
    const searchInput = document.getElementById('searchInput');

    // لو المايك شغال فعلاً وداس عليه تاني، نوقفه
    if (recognizer) {
        recognizer.stop();
        recognizer = null;
        micBtn.classList.remove('listening');
        return;
    }

    recognizer = new SR();
    recognizer.lang = 'ar-EG'; // لغة البحث عربي مصري
    recognizer.interimResults = false;

    // تشغيل أنيميشن النبض للمايك
    micBtn.classList.add('listening');

    recognizer.onresult = (e) => {
        // بمجرد ما يلقط الكلمة، يحطها في مربع البحث
        const spokenText = e.results[0][0].transcript;
        searchInput.value = spokenText;

        // نشغل دالة البحث أوتوماتيك عشان النتيجة تطلع فوراً
        runSearch();
    };

    recognizer.onend = () => {
        // إيقاف الأنيميشن لما يخلص كلام
        micBtn.classList.remove('listening');
        recognizer = null;
    };

    recognizer.onerror = () => {
        micBtn.classList.remove('listening');
        recognizer = null;
    };

    recognizer.start();
}
</script>

</body>
</html>
