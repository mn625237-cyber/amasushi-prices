const deliveryData = rawData.trim().split('\n').map(line => {
    const parts = line.split(',');
    return {
        ar: parts[0] ? parts[0].trim() : "",
        en: parts[1] ? parts[1].trim() : "",
        price: parts[2] ? parts[2].trim() : "",
        searchKey: normalizeArabic((parts[0] || "") + (parts[1] || "") + (parts[2] || ""))
    };
});

function runSearch() {
    const query = normalizeArabic(document.getElementById('searchInput').value);
    const resultsBox = document.getElementById('resultsBox');
    
    if (query === "") {
        resultsBox.innerHTML = '<div class="no-data">اكتب اسم المكان لتعرف سعر خدمة الطيار..</div>';
        return;
    }

    const filtered = deliveryData.filter(item => item.searchKey.includes(query));

    if (filtered.length > 0) {
        resultsBox.innerHTML = filtered.map(item => `
            <div class="result-item">
                <div class="area-info">
                    <span class="area-name">${item.ar}</span>
                    <span class="area-en">${item.en}</span>
                </div>
                <div class="price-tag">
                    <span class="price-label">خدمة الطيار</span>
                    ${item.price} ج.م
                </div>
            </div>
        `).join('');
    } else {
        resultsBox.innerHTML = '<div class="no-data">لم نجد هذا المكان.. جرب كتابته بشكل مختلف 🔍</div>';
    }
}
