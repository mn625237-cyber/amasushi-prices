<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صيانة دورية - اما سوشي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- إحصائيات جوجل -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-TYBEKK9GW6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-TYBEKK9GW6');
    </script>

    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background-color: #0D0D0D; font-family: 'Cairo', sans-serif; color: white;
            text-align: center;
        }
        .container { padding: 20px; }
        .logo {
            width: 120px; height: 120px; border-radius: 50%;
            border: 3px solid #FF6C2F; margin-bottom: 20px;
        }
        .gear {
            font-size: 50px; color: #FF6C2F;
            display: inline-block; animation: spin 2s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        h1 { font-size: 24px; color: #FF6C2F; margin: 10px 0; }
        p { color: #A0A0A0; font-size: 16px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.jpg" alt="Logo" class="logo">
        <br>
        <div class="gear">⚙️</div>
        <h1>الموقع موقوف مؤقتاً</h1>
        <p>جاري تحديث قائمة الأسعار والخدمات<br>سنعود للعمل خلال دقائق إن شاء الله.</p>
    </div>
</body>
</html>
